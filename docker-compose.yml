services:
  bot:
    build:
      context: ./irandeals-bot
      dockerfile: Dockerfile
    environment:
      - BOT_TOKEN
      - ADMIN_TELEGRAM_IDS
      - PUBLIC_CHANNEL_ID
      - DATABASE_URL
      - REDIS_URL
      - JWT_SECRET
      - JWT_EXPIRES_IN
      - API_PORT
      - NODE_ENV
      - ADMIN_UI_PASSWORD
      - MAX_DEALS_PER_WEEK
      - MAX_INSTANT_PER_DAY
    ports:
      - "4000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  admin:
    build:
      context: ./irandeals-admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      bot:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: irandeals
      POSTGRES_PASSWORD: irandeals
      POSTGRES_DB: irandeals
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irandeals"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
