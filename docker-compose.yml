services:
  bot:
    build:
      context: ./irandeals-bot
      dockerfile: Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      PUBLIC_CHANNEL_ID: ${PUBLIC_CHANNEL_ID:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://irandeals:irandeals@db:5432/irandeals}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: ${API_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      ADMIN_UI_PASSWORD: ${ADMIN_UI_PASSWORD:-changeme}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:5173}
      MAX_DEALS_PER_WEEK: ${MAX_DEALS_PER_WEEK:-5}
      MAX_INSTANT_PER_DAY: ${MAX_INSTANT_PER_DAY:-3}
      MAX_DIGEST_DEALS: ${MAX_DIGEST_DEALS:-5}
      MAX_WEEKLY_DIGEST_DEALS: ${MAX_WEEKLY_DIGEST_DEALS:-10}
      DEAL_DEFAULT_TTL_DAYS: ${DEAL_DEFAULT_TTL_DAYS:-30}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  admin:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./irandeals-admin:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      bot:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: irandeals
      POSTGRES_PASSWORD: irandeals
      POSTGRES_DB: irandeals
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irandeals"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
